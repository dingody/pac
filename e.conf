[General]
bypass-system = true
skip-proxy = localhost,*.local,captive.apple.com,*.cmbchina.com,*.icbc.com.cn,*.boc.cn,*.abchina.com,*.bankcomm.com,*.psbc.com,*.ccb.com,*.chinaunionpay.com,*.alipay.com,*.tenpay.com,*.pay.wechat.com,*.unionpaysecure.com,*.95516.com,*.sdb.com.cn,*.spdb.com.cn,*.czbank.com,*.cib.com.cn,*.citicbank.com,*.cebbank.com,*.cgbchina.com.cn,*.hxb.com.cn,*.pingan.com,*.ecitic.com,*.bocom.cn,*.bocfullertonbank.com,*.hzbank.com.cn,*.ocbc.com.cn,*.chinapost.com.cn,*.msn.cn,*.msftconnecttest.com,*.msftncsi.com,*.rds.aliyuncs.com
bypass-tun = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,239.0.0.0/8,239.255.255.250/32,255.255.255.255/32
fallback-dns-server = system
ipv6 = false
prefer-ipv6 = false
dns-direct-system = false
icmp-auto-reply = true
private-ip-answer = true
dns-direct-fallback-proxy = false
update-url = https://raw.githubusercontent.com/dingody/pac/refs/heads/master/e.conf

[Rule]

DOMAIN-SUFFIX,apple.com,DIRECT
DOMAIN-SUFFIX,icloud.com,DIRECT
DOMAIN-SUFFIX,me.com,DIRECT
DOMAIN-SUFFIX,msftconnecttest.com,DIRECT
DOMAIN-SUFFIX,msftncsi.com,DIRECT

# 本地域名
DOMAIN,localhost,DIRECT
DOMAIN-SUFFIX,local,DIRECT
DOMAIN-SUFFIX,lan,DIRECT
DOMAIN-SUFFIX,home.arpa,DIRECT

# 内网 / 本机 / CGNAT
IP-CIDR,10.0.0.0/8,DIRECT,no-resolve
IP-CIDR,100.64.0.0/10,DIRECT,no-resolve
IP-CIDR,127.0.0.0/8,DIRECT,no-resolve
IP-CIDR,169.254.0.0/16,DIRECT,no-resolve
IP-CIDR,172.16.0.0/12,DIRECT,no-resolve
IP-CIDR,192.168.0.0/16,DIRECT,no-resolve

# 组播 / 广播
IP-CIDR,224.0.0.0/4,DIRECT,no-resolve
IP-CIDR,239.0.0.0/8,DIRECT,no-resolve
IP-CIDR,239.255.255.250/32,DIRECT,no-resolve
IP-CIDR,255.255.255.255/32,DIRECT,no-resolve

# 文档 / 测试 / 基准测试地址，可选
IP-CIDR,192.0.0.0/24,DIRECT,no-resolve
IP-CIDR,192.0.2.0/24,DIRECT,no-resolve
IP-CIDR,198.18.0.0/15,DIRECT,no-resolve
IP-CIDR,198.51.100.0/24,DIRECT,no-resolve
IP-CIDR,203.0.113.0/24,DIRECT,no-resolve

RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/China/China.list,DIRECT
DOMAIN-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/China/China_Domain.list,DIRECT
GEOIP,CN,DIRECT


FINAL,PROXY

[Host]
localhost = 127.0.0.1
